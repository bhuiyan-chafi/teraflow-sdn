<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Topology | Interactive View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
      }
      #topology-container {
        width: 100%;
        height: 700px;
        background-color: #ffffff;
        border: 1px solid #dee2e6;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }
      .card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      }
      .btn-premium {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 30px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      .btn-premium:hover {
        transform: translateY(-2px);
        color: white;
        background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
      }
    </style>
  </head>
  <body>
    <div class="container-fluid py-5 px-4">
      <div class="row justify-content-center">
        <div class="col-xl-10">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <h1 class="h2 mb-1 fw-bold">Network Topology</h1>
              <p class="text-muted">Interactive map of optical devices and fiber links</p>
            </div>
            <div class="d-flex gap-2">
              <a href="{{ url_for('index') }}" class="btn btn-outline-secondary rounded-pill">Back Home</a>
              <button onclick="takeScreenshot()" class="btn btn-outline-primary rounded-pill">Download Screenshot</button>
              <button onclick="stabilizeNetwork()" class="btn btn-premium">Reset Layout</button>
            </div>
          </div>
          
          <div class="card">
            <div class="card-body p-0">
              <div id="topology-container"></div>
            </div>
          </div>

          <div class="mt-4 text-center d-flex justify-content-center align-items-center gap-4 flex-wrap">
            <div class="d-flex align-items-center">
              <span class="d-inline-block me-2" style="width: 14px; height: 14px; background-color: #2c3e50; border-radius: 2px;"></span>
              <span class="small fw-bold">Transponder</span>
            </div>
            <div class="d-flex align-items-center">
              <span class="d-inline-block me-2" style="width: 14px; height: 14px; background-color: #e67e22; border-radius: 50%;"></span>
              <span class="small fw-bold">ROADM</span>
            </div>
            <div class="d-flex align-items-center border-start ps-4">
              <span class="d-inline-block me-2" style="width: 25px; height: 3px; background-color: #3498db;"></span>
              <span class="small fw-bold text-muted">OCH Link (Blue)</span>
            </div>
            <div class="d-flex align-items-center pe-4 border-end">
              <span class="d-inline-block me-2" style="width: 25px; height: 3px; background-color: #95a5a6;"></span>
              <span class="small fw-bold text-muted">OMS Link (Grey)</span>
            </div>
            <span class="text-muted small"><i class="bi bi-info-circle"></i> Use scroll to zoom, drag nodes to layout.</span>
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      // Data passed from Flask
      const topoData = {{ topo_data | tojson | safe }};

      // Configuration for Vis.js
      const container = document.getElementById('topology-container');
      const data = {
        nodes: new vis.DataSet(topoData.nodes),
        edges: new vis.DataSet(topoData.edges)
      };
      
      const options = {
        nodes: {
          borderWidth: 2,
          shadow: true
        },
        edges: {
          width: 2,
          selectionWidth: 4,
          hoverWidth: 1.5,
          font: {
            size: 16,
            bold: true,
            align: 'middle',
            background: 'rgba(255, 255, 255, 0.85)',
            color: '#2c3e50',
            face: 'Inter, sans-serif'
          },
          arrows: {
            to: { enabled: false }
          },
          color: {
            inherit: false,
            opacity: 0.8
          }
        },
        physics: {
          enabled: true,
          barnesHut: {
            gravitationalConstant: -2000,
            centralGravity: 0.3,
            springLength: 150,
            springConstant: 0.04,
            damping: 0.09,
            avoidOverlap: 1
          },
          stabilization: {
            iterations: 200,
            updateInterval: 25
          }
        },
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        }
      };

      const network = new vis.Network(container, data, options);

      function stabilizeNetwork() {
        network.stabilize();
      }

      function takeScreenshot() {
        // Get the canvas element from Vis.js
        const canvas = container.getElementsByTagName('canvas')[0];
        if (!canvas) return;

        // Create a temporary link to download the image
        const link = document.createElement('a');
        link.download = `network_topology_${new Date().toISOString().split('T')[0]}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }

      // Handle window resize
      window.addEventListener('resize', () => {
        network.redraw();
      });
    </script>
  </body>
</html>
