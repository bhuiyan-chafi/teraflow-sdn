services:
  rsa_dev_paneu:
    image: rsa_project_paneu
    build: .
    container_name: rsa_dev_paneu
    ports:
      - "3001:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://rsa_user:rsa_password@db_paneu:5432/rsa_db
    links:
      - db_paneu
    depends_on:
      db_paneu:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('localhost', 5000))\"" ]
      interval: 5s
      timeout: 5s
      retries: 10

  rsa_api_paneu:
    image: rsa_project_api_paneu
    build: .
    container_name: rsa_api_paneu
    command: python path_blocking/api.py
    ports:
      - "5002:5001"
    volumes:
      - .:/app
    environment:
      - FLASK_DEBUG=1
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://rsa_user:rsa_password@db_paneu:5432/rsa_db
    links:
      - db_paneu
    depends_on:
      db_paneu:
        condition: service_healthy
      rsa_dev_paneu:
        condition: service_started

  db_paneu:
    image: postgres:15-alpine
    container_name: rsa_db_paneu
    environment:
      POSTGRES_USER: rsa_user
      POSTGRES_PASSWORD: rsa_password
      POSTGRES_DB: rsa_db
    ports:
      - "5443:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rsa_user -d rsa_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db_init_paneu:
    image: postgres:15-alpine
    container_name: rsa_db_init_paneu
    volumes:
      - ./sql:/sql
      - ./init_db_paneu.sh:/init_db_paneu.sh
    environment:
      - PGPASSWORD=rsa_password
    depends_on:
      rsa_dev_paneu:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "/init_db_paneu.sh" ]
